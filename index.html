<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" id="dynamic-favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="title" content="Centria – Platformă inteligentă de management" />
    <meta name="description" content="Platformă digitală pentru managementul cererilor din administrația publică. Simplu, rapid și eficient." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Centria - Platformă inteligentă de management</title>

    <style>
      /* Resetare margini și setarea unei culori premium pentru selectarea textului */
      body {
        margin: 0;
        background-color: #f8fafc;
      }
      ::selection {
        background-color: #0284c7; /* Sky 600 */
        color: white;
      }

      /* Stilurile pentru Ecranul de Încărcare */
      .centria-startup-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(to bottom right, #0c4a6e, #0369a1, #0284c7);
        font-family: 'Inter', sans-serif;
        color: white;
      }

      .centria-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        border-top-color: #ffffff;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 20px;
      }

      .centria-pulse-text {
        font-size: 1.125rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      /* Animațiile CSS pure */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="centria-startup-loader">
        <div class="centria-spinner"></div>
        <div class="centria-pulse-text">Centria se inițializează...</div>
      </div>
    </div>
    
    <script>
      (function() {
        const favicon = document.getElementById('dynamic-favicon');
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        
        let angle = 0;
        let animationFrameId;

        function animateFavicon() {
          // Curățăm canvas-ul
          ctx.clearRect(0, 0, 32, 32);

          // Desenăm cercul de fundal (semitransparent)
          ctx.beginPath();
          ctx.arc(16, 16, 12, 0, 2 * Math.PI);
          ctx.strokeStyle = 'rgba(2, 132, 199, 0.2)'; // Culoare albastru deschis
          ctx.lineWidth = 4;
          ctx.stroke();

          // Desenăm spinner-ul animat (partea plină care se învârte)
          ctx.beginPath();
          ctx.arc(16, 16, 12, angle, angle + Math.PI / 1.5);
          ctx.strokeStyle = '#0284c7'; // Culoare albastru puternic
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';
          ctx.stroke();

          // Actualizăm imaginea favicon-ului
          favicon.href = canvas.toDataURL('image/png');
          angle += 0.15; // Viteza de rotație

          // Verificăm dacă loader-ul principal mai există pe ecran
          const loader = document.querySelector('.centria-startup-loader');
          if (loader) {
            // Continuăm animația
            animationFrameId = requestAnimationFrame(animateFavicon);
          } else {
            // Oprim animația și setăm logo-ul tău original când React a încărcat aplicația
            cancelAnimationFrame(animationFrameId);
            favicon.href = '/favicon.png';
          }
        }

        // Pornim animația
        animateFavicon();
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
